name: VPS Catalog

on:
  push:
    paths:
      - "vps/**"
      - "landing/**"
      - "deploy/**"
      - ".github/workflows/vps-validate.yml"
  pull_request:
    paths:
      - "vps/**"
      - "landing/**"
      - "deploy/**"
      - ".github/workflows/vps-validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vps/package-lock.json
      - run: npm ci
      - run: npm run validate
      - run: docker build -t gsm-presets ./vps
        working-directory: .
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: brand/package-lock.json
      - run: npm ci && npm run generate
        working-directory: brand
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: landing/package-lock.json
      - run: npm ci && npm run build
        working-directory: landing
