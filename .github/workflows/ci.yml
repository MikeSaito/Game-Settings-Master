name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "landing/**"
      - "SECURITY.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "landing/**"
      - "SECURITY.md"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: npm ci

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Verify TypeScript bindings in sync
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/verify-types-sync.ps1

      - name: Rust release compile check
        working-directory: src-tauri
        run: cargo check --release

      - name: Frontend build
        run: npm run build

      - name: Frontend unit tests
        run: npm test

      - name: Catalog builder tests
        run: npm run catalog:test
