name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: npm ci

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Verify TypeScript bindings in sync
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/verify-types-sync.ps1

      - name: Rust release compile check
        working-directory: src-tauri
        run: cargo build --release

      - name: Frontend build
        run: npm run build

      - name: Frontend unit tests
        run: npm test

      - name: Catalog builder tests
        run: npm run catalog:test

      - name: Landing build
        run: npm ci --prefix landing && npm run build --prefix landing
